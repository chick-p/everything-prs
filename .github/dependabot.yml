version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    cooldown:
      default-days: 3
    groups:
      octkit:
        patterns:
          - "@octokit/*"
      eslint:
        patterns:
          - "@eslint/*"
          - "eslint*"
          - "typescript-eslint"
